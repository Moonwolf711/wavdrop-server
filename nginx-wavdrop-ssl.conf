server {
    listen 80;
    server_name wavdrop.76.13.127.240.sslip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wavdrop.76.13.127.240.sslip.io;

    ssl_certificate /etc/letsencrypt/live/wavdrop.76.13.127.240.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wavdrop.76.13.127.240.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 500M;

    location ~ ^/(collab|battle)$ {
        proxy_pass http://127.0.0.1:7781;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass http://127.0.0.1:7781;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }
}
